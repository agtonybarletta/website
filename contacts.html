<!DOCTYPE html>
<html>
  <head>
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,shrink-to-fit=no"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <title>A.G. Tony Barletta</title>
  </head>

  <body>
    <header>
      <h1>Tony's Website :)</h1>
      <nav>
        <a href="https://blog.agtb.it">Blog</a>
        <!--<a href="/projects">Projects</a>-->
        <a href="https://git.agtb.it">Git server</a>
        <a href="contacts">Contacts</a>
      </nav>
    </header>

    <article>
		<h2> Contact page</h2>
		<form>
			<label for="email">Email:</label>
			<input type="email" id="email" name="email"></br>
			<label for="request">Reason:</label>
			<select id="request" name="reqest">
				<option value="email">Email</option>
				<option value="cv">CV</option>
				<option value="phone">Phone number</option>
			</select></br>
			<label for="reason">Text:</label>
			<textarea type="textarea" id="reason" name="reason"></textarea></br>
			<input type="button" value="Submit" onclick="sendContactRequest()">
		</form>
    </article>
    <footer>
      <h2>Footer</h2>
      copyright 2020
    </footer>
	<script>
		function sendContactRequest(){
			var data = {}
			data.email = document.getElementById("email").value;
			data.reason = document.getElementById("reason").value;
			data.request = document.getElementById("request").value;
			const formData = new FormData();
			formData.append('email', data.email);
			formData.append('reason', data.reason);
			formData.append('request', data.request);
			console.log(JSON.stringify(data));
			fetch('http://localhost:3000/',
				{method:'POST',
					headers: {
						'Content-Type': 'application/json',
					},
					body: JSON.stringify(data)
				}
			).then(r => r? r.json(): Promise.resonlve(r)).then(r => console.log(r));
			
			return;
		}
	</script>
  </body>
</html>
