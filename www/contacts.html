<h1 id="contact-page">Contact Page</h1>

		<form>
			<label for="email">Email:</label>
			<input type="email" id="email" name="email"></br>
			<label for="request">Reason:</label>
			<select id="request" name="reqest">
				<option value="email">Email</option>
				<option value="cv">CV</option>
				<option value="phone">Phone number</option>
			</select></br>
			<label for="reason">Text:</label>
			<textarea type="textarea" id="reason" name="reason"></textarea></br>
			<input type="button" value="Submit" onclick="sendContactRequest()">
		</form>
    </article>
	<script>
		function sendContactRequest(){
			var data = {}
			data.email = document.getElementById("email").value;
			data.reason = document.getElementById("reason").value;
			data.request = document.getElementById("request").value;
			const formData = new FormData();
			formData.append('email', data.email);
			formData.append('reason', data.reason);
			formData.append('request', data.request);
			console.log(JSON.stringify(data));
			fetch('http://localhost:3000/',
				{method:'POST',
					headers: {
						'Content-Type': 'application/json',
					},
					body: JSON.stringify(data)
				}
			).then(r => r? r.json(): Promise.resonlve(r)).then(r => console.log(r));
			
			return;
		}
	</script>
